<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Westcoast Education</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="index.html">Westcoast Education</a>
        <div class="navbar-nav">
          <a class="nav-link" href="index.html">Vara Kurser</a>
          <a class="nav-link" href="admin.html">Admin</a>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <h1 class="mb-4">Administrationsverktyg</h1>

      <div class="row g-4">
        <div class="col-md-6">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h2 class="h4 mb-3">Lägg till ny kurs</h2>
              <form id="course-form">
                <div class="mb-3">
                  <label for="title" class="form-label">Kurstitel</label>
                  <input type="text" class="form-control" id="title" name="title" />
                </div>
                <div class="mb-3">
                  <label for="course-number" class="form-label">Kursnummer</label>
                  <input type="text" class="form-control" id="course-number" name="courseNumber" />
                </div>
                <div class="mb-3">
                  <label for="duration-days" class="form-label">Antal dagar</label>
                  <input type="number" class="form-control" id="duration-days" name="durationDays" />
                </div>
                <div class="mb-3">
                  <label for="type" class="form-label">Typ</label>
                  <input type="text" class="form-control" id="type" name="type" />
                </div>
                <div class="mb-3">
                  <label for="image-url" class="form-label">Bild-URL</label>
                  <input type="text" class="form-control" id="image-url" name="imageUrl" />
                </div>
                <div class="mb-3">
                  <label for="start-date" class="form-label">Startdatum</label>
                  <input type="date" class="form-control" id="start-date" name="startDate" />
                </div>
                <div class="mb-3">
                  <label for="price" class="form-label">Pris</label>
                  <input type="number" class="form-control" id="price" name="price" />
                </div>
                <button type="submit" class="btn btn-primary">Spara Kurs</button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h2 class="h4 mb-3">Bokningar</h2>
              <ul id="booking-list" class="list-group"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./src/admin.js"></script>
  </body>
</html>
