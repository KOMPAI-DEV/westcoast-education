<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Westcoast Education</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container py-4">
      <h1 class="mb-4">Våra Kurser</h1>
      <div id="course-list" class="row g-4"></div>
    </div>

    <div class="modal fade" id="bookingModal" tabindex="-1" aria-labelledby="bookingModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="bookingModalLabel">Boka kurs</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Stang"></button>
          </div>
          <div class="modal-body">
            <p id="selected-course" class="fw-semibold mb-3"></p>
            <form id="booking-form">
              <div class="mb-3">
                <label for="customer-name" class="form-label">Kundnamn</label>
                <input type="text" class="form-control" id="customer-name" name="customerName" />
              </div>
              <div class="mb-3">
                <label for="billing-address" class="form-label">Faktureringsadress</label>
                <input type="text" class="form-control" id="billing-address" name="billingAddress" />
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">E-postadress</label>
                <input type="email" class="form-control" id="email" name="email" />
              </div>
              <div class="mb-3">
                <label for="mobile" class="form-label">Mobilnummer</label>
                <input type="tel" class="form-control" id="mobile" name="mobile" />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Stang</button>
            <button type="submit" form="booking-form" class="btn btn-primary">Skicka bokning</button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
